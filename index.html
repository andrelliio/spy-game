function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ==================== GAME SCREEN ====================
function GameScreen({ players: initialPlayers, assignments, penaltyDeck, onRestart, onFinish }) {
  const [gamePlayers, setGamePlayers] = useState(initialPlayers);
  const [scores, setScores] = useState(() =>
    Object.fromEntries(initialPlayers.map(p => [p, assignments[p].length]))
  );
  const [penaltyIndex, setPenaltyIndex] = useState(0);
  const [penaltyReveal, setPenaltyReveal] = useState(null);
  const [swapReveal, setSwapReveal] = useState(null);
  const [showRules, setShowRules] = useState(false);
  const [showAddPlayer, setShowAddPlayer] = useState(false);
  const [newName, setNewName] = useState("");
  const [newWordCount, setNewWordCount] = useState(5);
  const [newPlayerWords, setNewPlayerWords] = useState(null);

  const players = gamePlayers;
  const sorted = [...players].sort((a, b) => scores[a] - scores[b]);

  const handleUsed = (p) => { if (scores[p] > 0) setScores(s => ({...s, [p]: s[p] - 1})); };
  const handleUndo = (p) => { setScores(s => ({...s, [p]: s[p] + 1})); };
  const handlePenalty = (p) => {
    if (penaltyIndex >= penaltyDeck.length) return;
    const word = penaltyDeck[penaltyIndex];
    setScores(s => ({...s, [p]: s[p] + 1}));
    setPenaltyReveal({ player: p, word });
    setPenaltyIndex(i => i + 1);
  };
  const handleSwap = (p) => {
    if (penaltyIndex >= penaltyDeck.length) return;
    const word = penaltyDeck[penaltyIndex];
    setSwapReveal({ player: p, word });
    setPenaltyIndex(i => i + 1);
  };
  const handleAddPlayer = () => {
    const name = newName.trim();
    if (!name || players.includes(name)) return;
    if (penaltyIndex + newWordCount > penaltyDeck.length) return;
    const words = penaltyDeck.slice(penaltyIndex, penaltyIndex + newWordCount);
    setPenaltyIndex(i => i + newWordCount);
    setNewPlayerWords({ name, words });
  };
  const handleConfirmAdd = () => {
    if (!newPlayerWords) return;
    setGamePlayers(p => [...p, newPlayerWords.name]);
    setScores(s => ({...s, [newPlayerWords.name]: newPlayerWords.words.length}));
    setNewPlayerWords(null);
    setNewName("");
    setNewWordCount(5);
    setShowAddPlayer(false);
  };

  return e("div", { style: { minHeight: "100vh", background: BG, padding: "20px 16px" } },
    showRules && e(RulesModal, { onClose: () => setShowRules(false) }),
    e(InfoButton, { onClick: () => setShowRules(true) }),

    e("div", { style: { maxWidth: "420px", margin: "0 auto" } },

      e("div", { style: { textAlign: "center", marginBottom: "20px" } },
        e("h1", { style: {
          fontSize: "22px", fontWeight: 900, marginBottom: "4px",
          background: GRAD_TITLE, WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent"
        }}, "🤪 ИГРА ИДЁТ"),
        e("p", { style: { color: "rgba(255,255,255,0.35)", fontSize: "12px", fontFamily: "-apple-system, system-ui, sans-serif" } },
          "Штрафных слов: " + (penaltyDeck.length - penaltyIndex))
      ),

      e("div", { style: { marginBottom: "16px" } },
        sorted.map((p, i) => {
          const done = scores[p] === 0;
          const medal = i === 0 && done ? "🥇" : i === 1 && done ? "🥈" : i === 2 && done ? "🥉" : null;
          return e("div", { key: p, style: {
            background: done ? "rgba(0,184,148,0.08)" : CARD_BG,
            borderRadius: "16px", padding: "12px 14px", marginBottom: "6px",
            border: done ? "1px solid rgba(0,184,148,0.3)" : CARD_BORDER,
            display: "flex", alignItems: "center", justifyContent: "space-between"
          }},
            e("div", { style: { display: "flex", alignItems: "center", gap: "8px", flex: 1, minWidth: 0 } },
              medal && e("span", { style: { fontSize: "18px" } }, medal),
              e("span", { style: {
                color: done ? "#55efc4" : "#fff", fontWeight: 700, fontSize: "15px",
                overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap",
                fontFamily: "-apple-system, system-ui, sans-serif"
              }}, p)
            ),
            e("div", { style: { display: "flex", alignItems: "center", gap: "5px", flexShrink: 0 } },
              e("button", {
                onClick: () => handleUsed(p),
                disabled: done,
                style: {

// ==================== RESULTS SCREEN ====================
function ResultsScreen({ players, scores, onRestart }) {
  const sorted = [...players].sort((a, b) => scores[a] - scores[b]);

  // Calculate ranks with ties (sequential: 1,1,2,3 not 1,1,3,4)
  const ranks = [];
  let currentRank = 1;
  for (let i = 0; i < sorted.length; i++) {
    if (i > 0 && scores[sorted[i]] === scores[sorted[i - 1]]) {
      ranks.push(ranks[i - 1]); // same rank as previous
    } else {
      ranks.push(currentRank);
      currentRank++;
    }
  }

  const titles = [
    { emoji: "🥇", title: "ВЕЛИКОЛЕПНЫЙ БАЛАБОЛИЩЕ", color: "#feca57", glow: "0 0 40px rgba(254,202,87,0.4)" },
    { emoji: "🥈", title: "ЗНАТНЫЙ СЛОВОПЛЁТ", color: "#a29bfe", glow: "0 0 30px rgba(162,155,254,0.3)" },
    { emoji: "🥉", title: "ДЕРЗКИЙ БРЕДОНОС", color: "#ff6b6b", glow: "0 0 30px rgba(255,107,107,0.3)" }
  ];

  const loserTitles = [
    "Стажёр-словоблуд",
    "Подмастерье бреда",
    "Юный балабол",
    "Недоделанный трепач",
    "Практикант пурги",
    "Ученик чуши",
    "Любитель ляпов",
    "Кандидат в болтуны"
  ];

  return e("div", { style: {...centerCol, justifyContent: "flex-start", paddingTop: "40px", paddingBottom: "40px"} },
    e("div", { className: "float", style: { fontSize: "72px", marginBottom: "12px" } }, "🏆"),
    e("h1", { className: "fade-in", style: {
      fontSize: "clamp(28px,7vw,42px)", fontWeight: 900, marginBottom: "6px", textAlign: "center",
      background: GRAD_TITLE, WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent"
    }}, "ИГРА ОКОНЧЕНА!"),
    e("p", { className: "fade-in", style: {
      color: "rgba(255,255,255,0.4)", fontSize: "13px", marginBottom: "32px", fontFamily: "-apple-system, system-ui, sans-serif"
    }}, "Финальный подсчёт словоблудов"),

    e("div", { style: { maxWidth: "380px", width: "100%" } },
      sorted.map((p, i) => {
        const rank = ranks[i];
        const isTop3 = rank <= 3;
        const t = isTop3 ? titles[rank - 1] : null;
        const loserTitle = !isTop3 ? loserTitles[(i - 3) % loserTitles.length] : null;
        const wordsLeft = scores[p];
        const cleared = wordsLeft === 0;

        return e("div", {
          key: p,
          className: "fade-in",
          style: {
            background: isTop3 ? "rgba(255,255,255,0.05)" : CARD_BG,
            borderRadius: isTop3 ? "20px" : "16px",
            padding: isTop3 ? "20px" : "14px 16px",
            marginBottom: isTop3 ? "12px" : "6px",
            border: isTop3 ? "1px solid " + t.color + "33" : CARD_BORDER,
            boxShadow: isTop3 ? t.glow : "none",
            animation: `slideIn 0.5s ease-out ${i * 0.12}s both`
          }
        },
          isTop3 && e("div", { style: { textAlign: "center", marginBottom: "8px" } },
            e("span", { style: { fontSize: "36px" } }, t.emoji)
          ),
          isTop3 && e("div", { style: {
            textAlign: "center", fontSize: "11px", letterSpacing: "2px", textTransform: "uppercase",
            color: t.color, fontWeight: 700, marginBottom: "4px"
          }}, t.title),
          e("div", { style: { display: "flex", alignItems: "center", justifyContent: "space-between" } },
            e("div", { style: { display: "flex", alignItems: "center", gap: "10px" } },
              !isTop3 && e("span", { style: { color: "rgba(255,255,255,0.25)", fontSize: "14px", fontWeight: 700, minWidth: "24px" } }, rank + "."),
              e("div", null,
                e("div", { style: {
                  fontWeight: isTop3 ? 900 : 700, fontSize: isTop3 ? "22px" : "16px",
                  color: isTop3 ? "#fff" : "rgba(255,255,255,0.8)",
                  textAlign: isTop3 ? "center" : "left"
                }}, p),
                !isTop3 && e("div", { style: {
                  fontSize: "11px", color: "rgba(255,255,255,0.3)", fontFamily: "-apple-system, system-ui, sans-serif"
                }}, loserTitle)
              )
            ),
            e("div", { style: {
              background: cleared ? "rgba(0,184,148,0.15)" : "rgba(255,255,255,0.06)",
              borderRadius: "10px", padding: "6px 12px", textAlign: "center"
            }},
              cleared
                ? e("span", { style: { color: "#55efc4", fontWeight: 700, fontSize: "13px" } }, "ЧИСТО! ✨")
                : e("span", { style: { color: "#ff6b6b", fontWeight: 700, fontSize: "14px", fontFamily: "-apple-system, system-ui, sans-serif" } }, wordsLeft + " ост.")
            )
          )
        );
      })
    ),

    e("div", { className: "fade-in", style: { maxWidth: "380px", width: "100%", marginTop: "24px" } },
      e("button", {
        onClick: onRestart,
        style: {
          width: "100%", padding: "16px", fontSize: "17px", fontWeight: 700, borderRadius: "16px",
          border: "none", background: GRAD_WARM, color: "#1a1a2e", cursor: "pointer"
        }
      }, "🔄 Новая игра")
    )
  );
}

// ==================== APP ====================
function App() {
  const [screen, setScreen] = useState("welcome");
  const [modes, setModes] = useState([]);
  const [players, setPlayers] = useState([]);
  const [assignments, setAssignments] = useState({});
  const [penaltyDeck, setPenaltyDeck] = useState([]);
  const [finalScores, setFinalScores] = useState({});

  const handleModeSelect = (selectedModes) => {
    setModes(selectedModes);
    setScreen("setup");
  };

  const handleStart = (names, wpp) => {
    let pool = [];
    if (modes.includes("cenz")) pool = pool.concat(WORDS_CENZ);
    if (modes.includes("mat")) pool = pool.concat(WORDS_MAT);
    if (modes.includes("necenz")) pool = pool.concat(WORDS_NECENZ);

    const totalNeeded = names.length * wpp + 200;
    while (pool.length < totalNeeded) {
      pool = [...pool, ...pool.map(w => w + " " + (Math.floor(Math.random() * 99) + 1))];
    }
    const shuffled = shuffle(pool);
    const pw = {}; let idx = 0;
    for (const name of names) { pw[name] = shuffled.slice(idx, idx + wpp); idx += wpp; }
    setPlayers(names);
    setAssignments(pw);
    setPenaltyDeck(shuffled.slice(idx, idx + 200));
    setScreen("distribute");
  };

  const restart = () => { setScreen("welcome"); setPlayers([]); setAssignments({}); setPenaltyDeck([]); setModes([]); setFinalScores({}); window.scrollTo(0,0); };

  const handleFinish = (scores, allPlayers) => { setFinalScores(scores); setPlayers(allPlayers); setScreen("results"); window.scrollTo(0,0); };

  if (screen === "welcome") return e(WelcomeScreen, { onContinue: () => setScreen("modes") });
  if (screen === "modes") return e(ModeSelectScreen, { onSelect: handleModeSelect, onBack: () => setScreen("welcome") });
  if (screen === "setup") return e(StartScreen, { onStart: handleStart, onBack: () => setScreen("modes") });
  if (screen === "distribute") return e(DistributeScreen, { players, assignments, onDone: () => setScreen("game") });
  if (screen === "game") return e(GameScreen, { players, assignments, penaltyDeck, onRestart: restart, onFinish: handleFinish });
  if (screen === "results") return e(ResultsScreen, { players, scores: finalScores, onRestart: restart });
}

ReactDOM.createRoot(document.getElementById("app")).render(e(App));
</script>
