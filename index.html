function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

  const validCount = count && parseInt(count) >= 2 && parseInt(count) <= 20;

  return e("div", { style: centerCol },
    e("div", { style: { fontSize: "48px", marginBottom: "8px", textShadow: "0 0 40px rgba(255,100,100,0.5)" } }, "🤪"),
    e("h1", { style: {
      color: "#fff", fontSize: "clamp(28px,6vw,42px)", fontWeight: 800, marginBottom: "4px",
      letterSpacing: "-1px", textAlign: "center", textTransform: "uppercase",
      background: GRAD_TITLE, WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent"
    }}, "Словоблуд"),
    e("p", { style: { color: "rgba(255,255,255,0.5)", fontSize: "14px", marginBottom: "32px", letterSpacing: "3px", textTransform: "uppercase" } }, "Party Game"),

    step === "count" && e("div", { style: { width: "100%", maxWidth: "340px" } },
      e("label", { style: { color: "rgba(255,255,255,0.7)", fontSize: "14px", display: "block", marginBottom: "8px" } }, "Сколько игроков?"),
      e("input", {
        type: "number", min: 2, max: 20, value: count,
        onChange: ev => setCount(ev.target.value), placeholder: "2–20",
        style: {
          width: "100%", padding: "16px", fontSize: "24px", fontWeight: 700, textAlign: "center",
          borderRadius: "16px", border: "2px solid rgba(255,255,255,0.15)",
          background: "rgba(255,255,255,0.08)", color: "#fff", outline: "none"
        }
      }),
      e("button", {
        onClick: handleCountSubmit, disabled: !validCount,
        style: {
          width: "100%", marginTop: "16px", padding: "16px", fontSize: "18px", fontWeight: 700,
          borderRadius: "16px", border: "none",
          background: validCount ? GRAD_WARM : "rgba(255,255,255,0.1)",
          color: validCount ? "#1a1a2e" : "rgba(255,255,255,0.3)", cursor: validCount ? "pointer" : "default"
        }
      }, "Далее →")
    ),

    step === "names" && e("div", { style: { width: "100%", maxWidth: "340px" } },
      e("label", { style: { color: "rgba(255,255,255,0.7)", fontSize: "14px", display: "block", marginBottom: "12px" } }, "Введите имена игроков:"),
      e("div", { style: { maxHeight: "45vh", overflowY: "auto", marginBottom: "12px", paddingRight: "4px" } },
        names.map((name, i) =>
          e("input", {
            key: i, type: "text", value: name,
            onChange: ev => handleNameChange(i, ev.target.value),
            placeholder: "Игрок " + (i + 1),
            style: {
              width: "100%", padding: "12px 16px", fontSize: "16px", borderRadius: "12px",
              border: "2px solid rgba(255,255,255,0.1)", background: "rgba(255,255,255,0.06)",
              color: "#fff", outline: "none", marginBottom: "8px"
            }
          })
        )
      ),
      e("label", { style: { color: "rgba(255,255,255,0.7)", fontSize: "14px", display: "block", marginBottom: "8px" } },
        "Слов на игрока: ", e("strong", { style: { color: "#FBD786" } }, wordsPerPerson)
      ),
      e("input", {
        type: "range", min: 3, max: 10, value: wordsPerPerson,
        onChange: ev => setWordsPerPerson(parseInt(ev.target.value)),
        style: { width: "100%", marginBottom: "16px", accentColor: "#f7797d" }
      }),
      e("div", { style: { display: "flex", gap: "8px" } },
        e("button", {
          onClick: () => setStep("count"),
          style: {
            flex: 1, padding: "14px", fontSize: "16px", fontWeight: 600, borderRadius: "14px",
            border: "2px solid rgba(255,255,255,0.15)", background: "transparent",
            color: "rgba(255,255,255,0.7)", cursor: "pointer"
          }
        }, "← Назад"),
        e("button", {
          onClick: () => onStart(names.map(n => n.trim()), wordsPerPerson),
          disabled: !allFilled,
          style: {
            flex: 2, padding: "14px", fontSize: "18px", fontWeight: 700, borderRadius: "14px",
            border: "none", background: allFilled ? GRAD_WARM : "rgba(255,255,255,0.1)",
            color: allFilled ? "#1a1a2e" : "rgba(255,255,255,0.3)", cursor: allFilled ? "pointer" : "default"
          }
        }, "Начать игру 🎉")
      )
    )
  );
}

// ==================== DISTRIBUTE SCREEN ====================
function DistributeScreen({ players, assignments, onDone }) {
  const [ci, setCi] = useState(0);
  const [revealed, setRevealed] = useState(false);
  const [taken, setTaken] = useState(new Set());

  const player = players[ci];
  const words = assignments[player] || [];
  const allTaken = taken.size === players.length;

  const handleTaken = () => {
    const nt = new Set(taken); nt.add(ci); setTaken(nt);
    setRevealed(false);
    if (nt.size < players.length) setCi(ci + 1);
  };

  if (allTaken) {
    return e("div", { style: centerCol },
      e("div", { style: { fontSize: "64px", marginBottom: "16px" } }, "🎉"),
      e("h2", { style: { color: "#fff", fontSize: "28px", fontWeight: 800, marginBottom: "8px" } }, "Все готовы!"),
      e("p", { style: { color: "rgba(255,255,255,0.5)", marginBottom: "24px", fontSize: "15px" } }, "Все забрали свои слова. Начинайте вечеринку!"),
      e("button", {
        onClick: onDone,
        style: {
          padding: "18px 48px", fontSize: "18px", fontWeight: 700, borderRadius: "16px",
          border: "none", background: GRAD_WARM, color: "#1a1a2e", cursor: "pointer",
          boxShadow: "0 8px 30px rgba(247,121,125,0.4)"
        }
      }, "Перейти к игре →")
    );
  }

  return e("div", { style: centerCol },
    e("div", { style: { color: "rgba(255,255,255,0.4)", fontSize: "13px", letterSpacing: "2px", textTransform: "uppercase", marginBottom: "8px" } },
      (ci + 1) + " / " + players.length),
    e("div", { style: { fontSize: "14px", color: "rgba(255,255,255,0.5)", marginBottom: "6px" } }, "Передайте телефон:"),
    e("div", { style: {
      fontSize: "clamp(28px,7vw,40px)", fontWeight: 800, color: "#fff", marginBottom: "24px", textAlign: "center",
      background: GRAD_NAME, WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent"
    }}, player),

    !revealed
      ? e("button", {
          onClick: () => setRevealed(true),
          style: {
            padding: "18px 48px", fontSize: "18px", fontWeight: 700, borderRadius: "16px",
            border: "none", background: GRAD_PURPLE, color: "#fff", cursor: "pointer",
            boxShadow: "0 8px 30px rgba(102,126,234,0.4)"
          }
        }, "👀 Показать мои слова")
      : e("div", { style: { width: "100%", maxWidth: "360px" } },
          e("div", { style: {
            background: "rgba(255,255,255,0.06)", borderRadius: "20px", padding: "20px",
            border: "1px solid rgba(255,255,255,0.1)", marginBottom: "16px"
          }},
            e("div", { style: { color: "rgba(255,255,255,0.4)", fontSize: "12px", letterSpacing: "2px", textTransform: "uppercase", marginBottom: "12px" } }, "Твои словосочетания:"),
            ...words.map((w, i) =>
              e("div", { key: i, style: {
                padding: "10px 14px", background: "rgba(255,255,255,0.05)", borderRadius: "10px",
                marginBottom: "6px", color: "#fff", fontSize: "17px", fontWeight: 600,
                borderLeft: "3px solid #FBD786"
              }}, w)
            ),
            e("div", { style: { color: "#f7797d", fontSize: "13px", marginTop: "12px", textAlign: "center", fontWeight: 600 } }, "📸 Сфотографируй слова!")
          ),
          e("button", {
            onClick: handleTaken,
            style: {
              width: "100%", padding: "16px", fontSize: "18px", fontWeight: 700, borderRadius: "16px",
              border: "none", background: GRAD_GREEN, color: "#1a1a2e", cursor: "pointer",
              boxShadow: "0 8px 30px rgba(56,239,125,0.3)"
            }
          }, "✅ Забрал!")
        )
  );
}

// ==================== GAME SCREEN ====================
function GameScreen({ players, assignments, penaltyDeck, onRestart }) {
  const [scores, setScores] = useState(() =>
    Object.fromEntries(players.map(p => [p, assignments[p].length]))
  );
  const [penaltyIndex, setPenaltyIndex] = useState(0);
  const [penaltyReveal, setPenaltyReveal] = useState(null);

  const sorted = [...players].sort((a, b) => scores[a] - scores[b]);

  const handleUsed = (p) => { if (scores[p] > 0) setScores(s => ({...s, [p]: s[p] - 1})); };
  const handleUndo = (p) => { setScores(s => ({...s, [p]: s[p] + 1})); };
  const handlePenalty = (p) => {
    if (penaltyIndex >= penaltyDeck.length) return;
    const word = penaltyDeck[penaltyIndex];
    setScores(s => ({...s, [p]: s[p] + 1}));
    setPenaltyReveal({ player: p, word });
    setPenaltyIndex(i => i + 1);
  };

  return e("div", { style: { minHeight: "100vh", background: BG, padding: "24px" } },
    e("div", { style: { maxWidth: "420px", margin: "0 auto" } },

      // Header
      e("div", { style: { textAlign: "center", marginBottom: "20px" } },
        e("h1", { style: {
          color: "#fff", fontSize: "24px", fontWeight: 800, marginBottom: "4px",
          background: GRAD_TITLE, WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent"
        }}, "🤪 Игра идёт!"),
        e("p", { style: { color: "rgba(255,255,255,0.4)", fontSize: "13px" } },
          "Штрафных слов осталось: " + (penaltyDeck.length - penaltyIndex))
      ),

      // Leaderboard
      e("div", { style: { marginBottom: "20px" } },
        sorted.map((p, i) => {
          const done = scores[p] === 0;
          const medal = i === 0 && done ? "🥇" : i === 1 && done ? "🥈" : i === 2 && done ? "🥉" : null;
          return e("div", { key: p, style: {
            background: done ? "rgba(56,239,125,0.1)" : "rgba(255,255,255,0.05)",
            borderRadius: "16px", padding: "14px 16px", marginBottom: "8px",
            border: done ? "1px solid rgba(56,239,125,0.3)" : "1px solid rgba(255,255,255,0.08)",
            display: "flex", alignItems: "center", justifyContent: "space-between"
          }},
            e("div", { style: { display: "flex", alignItems: "center", gap: "10px", flex: 1, minWidth: 0 } },
              medal && e("span", { style: { fontSize: "20px" } }, medal),
              e("span", { style: {
                color: done ? "#38ef7d" : "#fff", fontWeight: 700, fontSize: "16px",
                overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap"
              }}, p)
            ),
            e("div", { style: { display: "flex", alignItems: "center", gap: "6px", flexShrink: 0 } },
              !done && e("button", {
                onClick: () => handleUsed(p),
                style: {
                  width: "36px", height: "36px", borderRadius: "10px", border: "none",
                  background: "rgba(56,239,125,0.15)", color: "#38ef7d", fontSize: "18px",
                  cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center"
                }
              }, "−"),
              !done && e("div", { style: {
                minWidth: "36px", height: "36px", borderRadius: "10px",
                background: "rgba(255,255,255,0.1)", color: "#FBD786", fontWeight: 800, fontSize: "18px",
                display: "flex", alignItems: "center", justifyContent: "center"
              }}, scores[p]),
              !done && e("button", {
                onClick: () => handleUndo(p),
                style: {
                  width: "36px", height: "36px", borderRadius: "10px", border: "none",
                  background: "rgba(255,255,255,0.08)", color: "rgba(255,255,255,0.5)", fontSize: "18px",
                  cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center"
                }
              }, "+"),
              done && e("span", { style: { color: "#38ef7d", fontWeight: 700, fontSize: "14px" } }, "ГОТОВ ✨")
            )
          );
        })
      ),

      // Penalty
      e("div", { style: {
        background: "rgba(247,121,125,0.08)", borderRadius: "20px", padding: "16px",
        border: "1px solid rgba(247,121,125,0.2)", marginBottom: "20px"
      }},
        e("div", { style: { color: "#f7797d", fontSize: "14px", fontWeight: 700, marginBottom: "12px", textAlign: "center", letterSpacing: "1px" } },
          "⚡ ШТРАФ — не угадал словоблуда"),
        e("p", { style: { color: "rgba(255,255,255,0.4)", fontSize: "12px", textAlign: "center", marginBottom: "12px" } },
          "Кто не угадал — получает новое слово в наказание"),
        e("div", { style: { display: "grid", gridTemplateColumns: "repeat(2, 1fr)", gap: "6px" } },
          players.map(p =>
            e("button", {
              key: p, onClick: () => handlePenalty(p),
              disabled: penaltyIndex >= penaltyDeck.length,
              style: {
                padding: "10px 8px", fontSize: "13px", fontWeight: 600, borderRadius: "10px", border: "none",
                background: penaltyIndex < penaltyDeck.length ? "rgba(247,121,125,0.15)" : "rgba(255,255,255,0.05)",
                color: penaltyIndex < penaltyDeck.length ? "#f7797d" : "rgba(255,255,255,0.2)",
                cursor: penaltyIndex < penaltyDeck.length ? "pointer" : "default",
                overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap"
              }
            }, p)
          )
        )
      ),

      // Restart
      e("button", {
        onClick: onRestart,
        style: {
          width: "100%", padding: "14px", fontSize: "16px", fontWeight: 600, borderRadius: "14px",
          border: "2px solid rgba(255,255,255,0.1)", background: "transparent",
          color: "rgba(255,255,255,0.5)", cursor: "pointer"
        }
      }, "🔄 Новая игра")
    ),

    // Modal
    penaltyReveal && e("div", {
      onClick: () => setPenaltyReveal(null),
      style: {
        position: "fixed", inset: 0, background: "rgba(0,0,0,0.7)", backdropFilter: "blur(8px)",
        display: "flex", alignItems: "center", justifyContent: "center", padding: "24px", zIndex: 100
      }
    },
      e("div", {
        onClick: ev => ev.stopPropagation(),
        style: {
          background: "linear-gradient(135deg, #302b63, #24243e)", borderRadius: "24px",
          padding: "32px", maxWidth: "340px", width: "100%",
          border: "1px solid rgba(255,255,255,0.15)", textAlign: "center"
        }
      },
        e("div", { style: { fontSize: "14px", color: "rgba(255,255,255,0.4)", marginBottom: "4px" } }, "Штрафное слово для"),
        e("div", { style: { fontSize: "24px", fontWeight: 800, color: "#fff", marginBottom: "16px" } }, penaltyReveal.player),
        e("div", { style: {
          padding: "14px 20px", background: "rgba(247,121,125,0.12)", borderRadius: "14px",
          border: "1px solid rgba(247,121,125,0.25)", color: "#FBD786", fontSize: "20px",
          fontWeight: 700, marginBottom: "20px"
        }}, penaltyReveal.word),
        e("p", { style: { color: "#f7797d", fontSize: "13px", marginBottom: "16px" } }, "📸 Запомни или сфоткай!"),
        e("button", {
          onClick: () => setPenaltyReveal(null),
          style: {
            padding: "14px 32px", fontSize: "16px", fontWeight: 700, borderRadius: "14px",
            border: "none", background: GRAD_WARM, color: "#1a1a2e", cursor: "pointer"
          }
        }, "Понял ✅")
      )
    )
  );
}

// ==================== APP ====================
function App() {
  const [screen, setScreen] = useState("start");
  const [players, setPlayers] = useState([]);
  const [assignments, setAssignments] = useState({});
  const [penaltyDeck, setPenaltyDeck] = useState([]);

  const handleStart = (names, wpp) => {
    const totalNeeded = names.length * wpp + 100;
    let pool = [...WORD_BANK];
    while (pool.length < totalNeeded) {
      pool = [...pool, ...WORD_BANK.map(w => w + " " + (Math.floor(Math.random() * 99) + 1))];
    }
    const shuffled = shuffle(pool);
    const pw = {}; let idx = 0;
    for (const name of names) { pw[name] = shuffled.slice(idx, idx + wpp); idx += wpp; }
    setPlayers(names);
    setAssignments(pw);
    setPenaltyDeck(shuffled.slice(idx, idx + 100));
    setScreen("distribute");
  };

  const restart = () => { setScreen("start"); setPlayers([]); setAssignments({}); setPenaltyDeck([]); };

  if (screen === "start") return e(StartScreen, { onStart: handleStart });
  if (screen === "distribute") return e(DistributeScreen, { players, assignments, onDone: () => setScreen("game") });
  if (screen === "game") return e(GameScreen, { players, assignments, penaltyDeck, onRestart: restart });
}

ReactDOM.createRoot(document.getElementById("app")).render(e(App));
</script>
